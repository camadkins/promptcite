#
# CodeQL — GitHub's static analysis. Runs on PR + weekly. Flags
# suspicious JS patterns (dynamic eval, hardcoded URLs, child_process
# injection, etc.) before they land on main.

name: CodeQL

on:
  # Run on every PR — path filters create a deadlock with branch
  # protection: if a required check is skipped (not failed, just
  # didn't run), the PR is permanently BLOCKED. Cheap to always run
  # (CodeQL on a no-code PR completes in ~30s as a no-op success).
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 3'   # Wednesdays at 09:17 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: javascript
