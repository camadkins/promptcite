#
# CodeQL — GitHub's static analysis. Runs on PR + weekly. Flags
# suspicious JS patterns (dynamic eval, hardcoded URLs, child_process
# injection, etc.) before they land on main.

name: CodeQL

on:
  # Run on every PR — path filters create a deadlock with branch
  # protection: if a required check is skipped (not failed, just
  # didn't run), the PR is permanently BLOCKED. Cheap to always run
  # (CodeQL on a no-code PR completes in ~30s as a no-op success).
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 3'   # Wednesdays at 09:17 UTC

# Top-level defaults to read-only. The analyze job below scopes up to
# the security-events write it needs for SARIF upload.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # SARIF upload to the Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Init CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          languages: javascript
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          category: javascript
