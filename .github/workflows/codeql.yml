# CodeQL — GitHub's static analysis. Runs on PR + weekly. Flags
# suspicious JS patterns (dynamic eval, hardcoded URLs, child_process
# injection, etc.) before they land on main.

name: CodeQL

on:
  pull_request:
    branches: [main]
    paths:
      - 'bin/**'
      - 'src/**'
      - '.github/workflows/codeql.yml'
  push:
    branches: [main]
    paths:
      - 'bin/**'
      - 'src/**'
  schedule:
    - cron: '17 9 * * 3'   # Wednesdays at 09:17 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: javascript
