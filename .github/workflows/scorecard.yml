#
# OSSF Scorecard — weekly supply-chain hygiene scoring. Publishes
# results to GitHub's security dashboard. Helps users audit project
# health before installing.
# See https://github.com/ossf/scorecard

name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '32 7 * * 1'   # Mondays at 07:32 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
