#
# Release — on v* tag push, create a GitHub Release with auto-generated
# notes and a sigstore build-provenance attestation. Users can verify
# the release wasn't tampered with by checking the attestation.

name: Release

on:
  push:
    tags:
      - 'v*'

# Top-level defaults to read-only. The release job below scopes up to
# write what it actually needs.
permissions:
  contents: read

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # sigstore attestation needs OIDC
      attestations: write   # required for actions/attest-build-provenance
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '18'

      - name: Verify install.js runs
        run: |
          node bin/install.js --version
          node bin/install.js --list
          node bin/install.js --dry-run --all

      - name: Build release tarball
        run: |
          # Exclude dev cruft from the release artifact
          tar -czf promptcite-${{ github.ref_name }}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.tar.gz' \
            .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: 'promptcite-${{ github.ref_name }}.tar.gz'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: |
            promptcite-${{ github.ref_name }}.tar.gz
          body: |
            ## PromptCite ${{ github.ref_name }}

            **Install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/camadkins/promptcite/${{ github.ref_name }}/install.sh | bash
            ```

            **Verify the release** (cosign required):
            ```bash
            gh attestation verify promptcite-${{ github.ref_name }}.tar.gz \
              --repo camadkins/promptcite
            ```

            See [INSTALL.md](https://github.com/camadkins/promptcite/blob/${{ github.ref_name }}/INSTALL.md) for per-agent install paths.
