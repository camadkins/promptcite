#
# release-please. watches main for conventional commits. when feat/fix
# commits accumulate, it opens a "chore: release X" PR that bumps the
# version in package.json and adds the CHANGELOG entry. merging that PR
# tags the release, which triggers the release.yml workflow to build,
# attest, and create the github release.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
