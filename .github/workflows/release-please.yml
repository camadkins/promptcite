#
# release-please. watches main for conventional commits. when feat/fix
# commits accumulate, it opens a "chore: release X" PR that bumps the
# version in package.json and adds the CHANGELOG entry. merging that PR
# tags the release, which triggers the release.yml workflow to build,
# attest, and create the github release.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # A dedicated token (fine-grained PAT or GitHub App), NOT the default
          # GITHUB_TOKEN. PRs opened by GITHUB_TOKEN do not trigger other
          # workflows, so the release PR never gets its required CI checks or a
          # CLA signature and cannot merge under branch protection
          # (enforce_admins=true). A PAT-authored release PR triggers CI and
          # signs the CLA like any human PR. Secret RELEASE_PLEASE_TOKEN needs
          # contents:write + pull-requests:write on this repo.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
