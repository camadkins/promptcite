# PromptCite Receipt Schema
# ---------------------------
# Contract for the structured JSON receipt produced by `/receipt`.
# Single source of truth for receipt shape. The interview rule file
# (src/rules/receipt.md) reads this contract; agent adapters validate
# emitted JSON against it.
#
# Schema versioning: bump `schema_version` on any non-backwards-compatible
# change. Universities relying on the receipt format need a stable contract.
# Migration strategy required before institutional adoption.

schema_version: "1.1"

# ---------------------------------------------------------------------------
# Top-level shape
# ---------------------------------------------------------------------------
fields:

  schema_version:
    type: string
    required: true
    description: |
      Version of this schema the receipt conforms to. Currently "1.1".
      Receipts produced by older clients tagged with their schema_version
      at generation time; consumers must check this before parsing.
      See docs/SCHEMA-CHANGELOG.md for the version history.
    pattern: '^\d+\.\d+$'

  generated_at:
    type: string
    required: true
    description: ISO-8601 timestamp at which the receipt was generated.
    format: iso8601

  metadata_source:
    type: string
    required: true
    description: |
      How the tool/model/date fields under `ai_use` were filled at
      generation time.

      - `"agent_reported"`: the AI agent filled `tool`, `model`, and
        `date` based on its own self-knowledge (student answered "this
        session" in Step 0 of the interview). Reduces friction for
        honest disclosure since the student doesn't have to remember
        the exact model version or look up today's date.

      - `"student_claimed"`: the student filled `tool`, `model`, and
        `date` themselves because they were disclosing AI use from a
        previous session or a different tool.

      Important: the receipt JSON is locally editable after generation.
      `metadata_source` is a transparency marker at generation time,
      not a cryptographic claim. See `content_hash` for the tamper-
      evident speed bump.
    enum:
      - agent_reported
      - student_claimed

  content_hash:
    type: string
    required: false
    nullable: true
    description: |
      SHA-256 of the canonical serialization of all other fields in this
      receipt (sorted keys, no whitespace, UTF-8). Lets a reviewer
      verify the receipt hasn't been edited since the agent emitted it.

      Computed by the agent at generation time if the agent has code
      execution available (Python interpreter, bash, etc.). If the
      agent has no code-execution tool, this field is `null` and the
      receipt is unverifiable beyond self-disclosure.

      Honest framing: tamper-evident, not tamper-proof. A determined
      student can recompute the hash after editing; the algorithm is
      public. The speed bump matters because most casual editing won't
      bother. Real cryptographic non-repudiation requires server-side
      signing or transparency-log inclusion, which is integration-
      phase work, not skill work.

      Verification: `npx -y github:camadkins/promptcite verify <file>`
      returns exit 0 on match, 1 on mismatch, 2 on missing/null hash.
    pattern: '^[a-f0-9]{64}$'

  submission_hash:
    type: string
    required: false
    nullable: true
    description: |
      SHA-256 of the *actual submitted file's bytes* (the essay, the
      source file, the PDF) — NOT of the receipt's own fields. This is
      what binds the receipt to the specific work it describes; without
      it, the receipt only attests "AI was used for some assignment,"
      never "AI was used for THIS document."

      Computed by the agent at generation time only if it has a
      code-execution tool AND the student points it at the submission
      file. Null otherwise (the common case — most agents won't have the
      file in hand). Added in schema 1.1.

      NOT part of the `content_hash` input — `content_hash` hashes the
      receipt's metadata fields; `submission_hash` hashes the external
      document. The two are independent.

      Honest framing: same trust model as `content_hash`. It ties the
      receipt to a specific file version a reviewer can re-hash, but the
      receipt remains locally editable and the student could re-hash a
      different file. Tamper-evident, not tamper-proof.
    pattern: '^[a-f0-9]{64}$'

  student:
    type: string
    required: true
    description: |
      Student identifier as authored by the student. Free-form, minimal
      data — first initial + last name, full name, or student ID. The
      student decides what level of identification they're comfortable
      with for this submission. PromptCite does not validate identity.
    min_length: 1
    max_length: 200

  assignment:
    type: object
    required: true
    description: Assignment context the receipt belongs to.
    fields:
      course:
        type: string
        required: true
        description: Course name or number (e.g. "ENGL 251", "CS 161").
      instructor:
        type: string
        required: true
        description: Instructor name (e.g. "Dr. Martinez").
      title:
        type: string
        required: true
        description: Assignment title (e.g. "Policy Analysis Essay").

  ai_use:
    type: object
    required: true
    description: How the AI was used in the production of this assignment.
    fields:
      tool:
        type: string
        required: true
        description: AI provider/product (e.g. "ChatGPT", "Claude", "Gemini", "Cursor").
      model:
        type: string
        required: true
        description: Model name and version (e.g. "GPT-4o", "Claude Sonnet 4.6").
      date:
        type: string
        required: true
        format: date
        description: Date of AI use, ISO 8601 date (YYYY-MM-DD).
      category:
        type: string
        required: true
        description: |
          Single-value `use_category`. Constrained to the closed set below.
          Definitions live in src/rules/receipt.md Step 3.
        enum:
          - brainstorm
          - outline
          - draft
          - edit
          - debug
          - explain
          - search
      prompt_summary:
        type: string
        required: true
        description: |
          Student-written description of what they asked the AI. NOT a
          raw transcript. One to three sentences. Authored by the
          student, recorded verbatim by the agent — no embellishment.
        min_length: 1
        max_length: 1000
      direct_content_used:
        type: boolean
        required: true
        description: |
          Whether any AI-generated text or code was kept verbatim in the
          submission. If true, the revision_statement should describe
          which portions and how.
      revision_statement:
        type: string
        required: true
        description: |
          What the student changed, rejected, or rewrote. The student-
          author's own words. One to three sentences.
        min_length: 1
        max_length: 1000
      source_verification:
        type: boolean
        required: false
        nullable: true
        description: |
          Whether the student independently checked sources the AI
          referenced. Required (`true`/`false`) when `category == search`.
          Optional (asked only on student opt-in) when `category == draft`
          and the draft contained factual claims. Null for all other
          categories — the AI did not provide sources or factual claims
          in those workflows, and the field stays null in the JSON output.
          The disclosure paragraph's "I independently verified ..."
          sentence renders only when this field is `true`.

  outputs:
    type: object
    required: true
    description: |
      The derived artifacts. Generated by the agent from the ai_use
      fields above using the templates in src/rules/receipt.md Step 5.
      The three core citation styles (MLA/APA/Chicago) are always
      included so an instructor can use an alternate without re-running;
      IEEE and Harvard are included additionally when the agent supports
      schema 1.1.
    fields:
      citation_mla:
        type: string
        required: true
        description: MLA-formatted citation string.
      citation_apa:
        type: string
        required: true
        description: APA-formatted citation string.
      citation_chicago:
        type: string
        required: true
        description: Chicago-formatted citation string.
      citation_ieee:
        type: string
        required: false
        description: |
          IEEE-formatted citation string. Added in schema 1.1 (optional,
          additive). Present when the agent supports it; older receipts
          (schema 1.0) omit it. Serves engineering / CS coursework.
      citation_harvard:
        type: string
        required: false
        description: |
          Harvard (author-date) citation string. Added in schema 1.1
          (optional, additive). Serves international / business courses.
          Older receipts (schema 1.0) omit it.
      disclosure_statement:
        type: string
        required: true
        description: |
          Plain-language disclosure paragraph for the paper's header or
          acknowledgments. One paragraph, 2–4 sentences. Generated from
          the ai_use fields using the template in receipt.md Step 7b.
        min_length: 1
        max_length: 2000

  appendix:
    type: object
    required: false
    description: |
      Optional fields the student or instructor may elect to include
      for higher-stakes assignments. Never auto-captured; always opt-in.
    fields:
      share_link_or_excerpt:
        type: string
        required: false
        description: |
          A chat share link or short excerpt of the AI conversation.
          Higher-stakes writing assignments. Opt-in only.
      full_transcript:
        type: string
        required: false
        description: |
          Complete log of the AI conversation. High-stakes writing or
          exams where the instructor requires full disclosure. Opt-in
          only; never auto-captured.
      diff_or_test_log:
        type: string
        required: false
        description: |
          For code assignments: a diff between AI-assisted and final
          versions, or test output. Higher-stakes CS assignments.
          Opt-in only.

# ---------------------------------------------------------------------------
# Validation rules (consumer-side; not enforced by YAML itself)
# ---------------------------------------------------------------------------
validation:
  - rule: schema_version_required
    message: schema_version must be present and match /^\d+\.\d+$/
  - rule: use_category_enum
    message: ai_use.category must be one of the seven listed values
  - rule: outputs_complete
    message: |
      The three core citation styles (citation_mla, citation_apa,
      citation_chicago) AND disclosure_statement must be present.
      citation_ieee and citation_harvard are optional (schema 1.1+).
  - rule: submission_hash_format
    message: |
      submission_hash, when present and non-null, must match
      /^[a-f0-9]{64}$/ (sha256 hex). It hashes the submitted file, not
      the receipt fields, and is never part of content_hash input.
  - rule: dates_iso8601
    message: ai_use.date must be ISO 8601 date (YYYY-MM-DD); generated_at must be ISO 8601 datetime
  - rule: no_transcript_default
    message: |
      appendix.full_transcript MUST NOT be present unless the student
      explicitly opted in during the interview. The interview rule file
      enforces this; downstream validators should reject receipts with
      full_transcript present and no corresponding opt-in marker.

# ---------------------------------------------------------------------------
# Migration policy
# ---------------------------------------------------------------------------
migration:
  policy: |
    Bumps to schema_version follow semver-style breaking-change semantics.
    A 1.x → 2.0 bump may rename, remove, or re-type fields. A 1.0 → 1.1
    bump may add optional fields only. Consumers reading older receipts
    must handle absent optional fields gracefully.
  history: |
    1.0 — initial receipt format (MVP).
    1.1 — additive: optional outputs.citation_ieee, outputs.citation_harvard,
          and top-level submission_hash. No fields removed or re-typed;
          schema 1.0 receipts remain valid 1.1 receipts.
    Canonical version history: docs/SCHEMA-CHANGELOG.md.
  open_questions:
    - How do we coordinate schema bumps with universities that have
      adopted the receipt format as a submission standard?
